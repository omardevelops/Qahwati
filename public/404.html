<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Qahwati ☕</title>
    <!--
      SPA redirect for GitHub Pages.
      Encodes the full path into the query string and sends the browser to
      the repo root (index.html), where a matching script decodes it back.
      See: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 1; // 1 = keep /Qahwati in the URL
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search
            ? '&' + l.search.slice(1).replace(/&/g, '~and~')
            : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
